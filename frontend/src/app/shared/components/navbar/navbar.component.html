<nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow-sm" style="height: 70px;">

    <!-- Sidebar Toggle (Topbar) -->
    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle me-3" (click)="toggleSidebar.emit()">
        <i class="fa fa-bars text-primary"></i>
    </button>

    <!-- Logo placeholder -->
    <div class="d-none d-sm-inline-block form-inline me-auto ms-md-3 mw-100 d-flex align-items-center" style="overflow: hidden;">
        <img src="/logo.png" style="max-height: 50px; object-fit: contain;" alt="Logo">
    </div>

    <!-- Topbar Navbar -->
    <ul class="navbar-nav ms-auto align-items-center">

        <div class="topbar-divider d-none d-sm-block mx-3"></div>

        <!-- Nav Item - User Information -->
        <li class="nav-item dropdown no-arrow" [class.show]="isUserMenuOpen">
            <a class="nav-link dropdown-toggle d-flex align-items-center cursor-pointer" href="javascript:void(0)" id="userDropdown" role="button" (click)="toggleUserMenu()">
                <div class="d-flex flex-column text-end me-3 d-none d-lg-flex">
                    <span class="text-gray-800 small font-weight-bold line-height-1">{{ user()?.name }}</span>
                    <span class="text-gray-500 extra-small line-height-1 mt-1">Online</span>
                </div>
                <img class="img-profile rounded-circle shadow-sm" [src]="imgProfile" style="height: 2.5rem; width: 2.5rem; object-fit: cover;">
            </a>
            
            <!-- Dropdown - User Information -->
            <div class="dropdown-menu dropdown-menu-end shadow-lg border-0 animated--fade-in mt-2" [class.show]="isUserMenuOpen" aria-labelledby="userDropdown" style="position: absolute; right: 0;">
                <div class="dropdown-header text-xs text-uppercase font-weight-bold text-gray-500 py-3">Configurações</div>
                <a class="dropdown-item py-2" routerLink="/profile">
                    <i class="fas fa-user fa-sm fa-fw me-2 text-gray-400"></i>
                    Meu Perfil
                </a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item py-2 text-danger" href="javascript:void(0)" 
                    (click)="!authService.isLoggingOut() && logout(); $event.preventDefault()"
                    [class.opacity-50]="authService.isLoggingOut()">
                    <i class="fas fa-sm fa-fw me-2 text-danger opacity-75" [ngClass]="authService.isLoggingOut() ? 'fa-spinner fa-spin' : 'fa-sign-out-alt'"></i>
                    {{ authService.isLoggingOut() ? 'Saindo...' : 'Sair do Sistema' }}
                </a>
            </div>
        </li>

    </ul>

</nav>
