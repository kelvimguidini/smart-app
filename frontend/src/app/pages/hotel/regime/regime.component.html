<app-authenticated-layout title="Regime">
    <ng-container header>
        <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
            <h1 class="h3 mb-0 text-gray-800">Gerenciamento de Regimes</h1>
        </div>
    </ng-container>

    <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <div class="modal fade" 
         [class.show]="showModal" 
         [style.display]="showModal ? 'block' : 'none'" 
         [style.background]="showModal ? 'rgba(0,0,0,0.5)' : ''" 
         tabindex="-1" 
         role="dialog" 
         aria-labelledby="regimeModalLabel" 
         aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content border-0 shadow-lg rounded-3xl">
          <div class="modal-header bg-light">
            <h5 class="modal-title font-weight-bold text-primary" id="regimeModalLabel">
              <i class="fas fa-briefcase me-2"></i>{{ inEdition > 0 ? 'Editar Regime' : 'Novo Regime' }}
            </h5>
            <button type="button" class="btn-close" (click)="closeModal()" aria-label="Fechar" [disabled]="processing"></button>
          </div>
          <form (ngSubmit)="submit()">
            <div class="modal-body p-4">
              <div class="row">
                <!-- Nome do Regime -->
                <div class="col-lg-12 mb-3">
                  <div class="form-group mb-0">
                    <label for="name" class="form-label">Nome do Regime <span class="text-danger">*</span></label>
                    <input 
                      type="text" 
                      id="name" 
                      class="form-control" 
                      [(ngModel)]="form.name" 
                      name="name" 
                      placeholder="Ex: ALL"
                      required 
                      autofocus
                      [class.is-invalid]="errors['name']">
                    
                    <div *ngIf="errors['name']" class="text-danger mt-1">
                      <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer bg-light border-0">
              <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
                <i class="fas fa-times me-1"></i> Cancelar
              </button>
              <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
                <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s;">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i>Lista de Regimes
            </h5>
            <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i> Novo Regime
            </button>
          </div>

                    <app-datatable 
                        [pagination]="pagination" 
                        [loading]="isLoader"
                        (search)="onSearch($event)"
                        (pageChange)="onPageChange($event)"
                        (perPageChange)="onPerPageChange($event)">
                        
                        <div class="table-responsive">
                            <table class="table table-hover" width="100%" cellspacing="0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" (click)="sortBy('id')" style="cursor: pointer; width: 80px;">
                                            <div class="d-flex align-items-center">
                                                ID <i class="fas fa-sort ms-2 text-muted" [ngClass]="{'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc', 'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc'}"></i>
                                            </div>
                                        </th>
                                        <th scope="col" (click)="sortBy('name')" style="cursor: pointer;">
                                            <div class="d-flex align-items-center">
                                                Nome <i class="fas fa-sort ms-2 text-muted" [ngClass]="{'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc', 'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc'}"></i>
                                            </div>
                                        </th>
                                        <th scope="col" class="text-end">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let regime of regimes" [class.table-info]="isRegimeInEdition(regime.id)">
                                        <th scope="row" class="font-weight-bold">{{ regime.id }}</th>
                                        <td>
                                            <span [class.text-muted]="!regime.active">{{ regime.name }}</span>
                                            <span *ngIf="!regime.active" class="badge bg-light text-muted ms-2">Inativo</span>
                                        </td>
                                        <td class="text-end">
                                            <div class="d-flex justify-content-end gap-2 flex-wrap">
                                                <!-- Editar -->
                                                <button class="btn btn-sm btn-info text-white shadow-sm" (click)="edit(regime)" title="Editar">
                                                    <i class="fas fa-edit me-1"></i> Editar
                                                </button>

                                                <!-- Ativar/Inativar -->
                                                <button *ngIf="!regime.active" class="btn btn-sm btn-success shadow-sm" (click)="activateRegime(regime.id)" title="Ativar">
                                                    <i class="fas fa-check me-1"></i> Ativar
                                                </button>

                                                <app-confirm-modal 
                                                    *ngIf="regime.active"
                                                    [btnClass]="'btn btn-sm btn-warning shadow-sm'" 
                                                    [modalTitle]="'Inativar Regime'" 
                                                    [message]="'Tem certeza que deseja inativar o regime ' + regime.name + '?'"
                                                    [okButtonLabel]="'Confirmar'"
                                                    (confirm)="deactivateRegime(regime.id)">
                                                    <span modal-button><i class="fas fa-ban me-1"></i> Inativar</span>
                                                </app-confirm-modal>

                                                <!-- Deletar -->
                                                <app-confirm-modal 
                                                    [btnClass]="'btn btn-sm btn-danger shadow-sm'" 
                                                    [modalTitle]="'Excluir Regime'" 
                                                    [message]="'Ação irreversível! Deseja realmente excluir o regime ' + regime.name + '?'"
                                                    [okButtonLabel]="'Excluir'"
                                                    (confirm)="deleteRegime(regime.id)">
                                                    <span modal-button><i class="fas fa-trash me-1"></i> Excluir</span>
                                                </app-confirm-modal>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr *ngFor="let i of [1,2,3,4,5].slice(0, isLoader ? 5 : 0)">
                                        <td colspan="3" class="text-center py-3">
                                            <div class="placeholder-glow">
                                                <span class="placeholder col-12 rounded"></span>
                                            </div>
                                        </td>
                                    </tr>
                                    <tr *ngIf="regimes.length === 0 && !isLoader">
                                        <td colspan="3" class="text-center py-5 text-muted">
                                            <i class="fas fa-folder-open fa-3x mb-3 d-block opacity-25"></i>
                                            Nenhum regime encontrado.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </app-datatable>
                </div>
            </div>
        </div>
    </div>
</app-authenticated-layout>
