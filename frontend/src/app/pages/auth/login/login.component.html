<div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-gradient-to-br from-gray-50 to-indigo-50">
    <div class="animate-in" style="animation-delay: 0.1s;">
        <a href="/">
            <div class="bg-white p-4 rounded-2xl shadow-lg mb-4">
                <img src="/logo.png" alt="SmartApp Logo" class="w-16 h-16 object-contain">
            </div>
        </a>
    </div>

    <div class="w-full sm:max-w-md mt-4 px-8 py-10 bg-white shadow-xl overflow-hidden sm:rounded-3xl animate-in" style="animation-delay: 0.2s;">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800">Bem-vindo de volta!</h2>
            <p class="text-gray-500 mt-2">Entre com suas credenciais para acessar sua conta.</p>
        </div>

        <form #loginForm="ngForm" (ngSubmit)="loginForm.valid && submit()" class="space-y-6">
            <div>
                <label for="email" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600 mb-2">E-mail</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input id="email" type="email" #emailInput="ngModel"
                        class="form-control block w-full border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 rounded-xl transition-all" 
                        style="padding-left: 3.25rem !important;"
                        [(ngModel)]="form.email" name="email" required email autofocus placeholder="seu@email.com"
                        (input)="errors.email = null"
                        [class.border-red-500]="(emailInput.invalid && (emailInput.dirty || emailInput.touched)) || loginForm.submitted">
                </div>
                
                <div *ngIf="(emailInput.invalid && (emailInput.dirty || emailInput.touched)) || loginForm.submitted" class="mt-1 text-xs text-red-500">
                    <span *ngIf="emailInput.errors?.['required']" class="flex items-center gap-1 mt-1"><i class="fas fa-exclamation-circle"></i> O e-mail é obrigatório.</span>
                    <span *ngIf="emailInput.errors?.['email']" class="flex items-center gap-1 mt-1"><i class="fas fa-exclamation-circle"></i> Insira um e-mail válido.</span>
                </div>
                <div *ngIf="errors.email" class="mt-2 text-sm text-red-600 flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> {{ errors.email?.[0] }}</div>
            </div>

            <div class="mt-4">
                <div class="flex items-center justify-between mb-2">
                    <label for="password" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600">Senha</label>
                    <a routerLink="/forgot-password" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">
                        Esqueceu a senha?
                    </a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input id="password" [type]="showPassword ? 'text' : 'password'" #passwordInput="ngModel"
                        class="form-control block w-full border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 rounded-xl transition-all" 
                        style="padding-left: 3.25rem !important; padding-right: 3rem !important;"
                        [(ngModel)]="form.password" name="password" required placeholder="••••••••"
                        (input)="errors.password = null"
                        [class.border-red-500]="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || loginForm.submitted">
                    
                    <button type="button" 
                        (click)="showPassword = !showPassword"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-indigo-600 transition-colors focus:outline-none">
                        <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
                
                <div *ngIf="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || loginForm.submitted" class="mt-1 text-xs text-red-500">
                    <span *ngIf="passwordInput.errors?.['required']" class="flex items-center gap-1 mt-1"><i class="fas fa-exclamation-circle"></i> A senha é obrigatória.</span>
                </div>
                <div *ngIf="errors.password" class="mt-2 text-sm text-red-600 flex items-center gap-1"><i class="fas fa-exclamation-triangle"></i> {{ errors.password?.[0] }}</div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center cursor-pointer group">
                    <input type="checkbox" name="remember" class="rounded border-gray-300 text-indigo-600 shadow-sm focus:ring-indigo-500 transition-all cursor-pointer" [(ngModel)]="form.remember">
                    <span class="ml-2 text-sm text-gray-600 group-hover:text-gray-900 transition-colors">Lembrar de mim</span>
                </label>
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:shadow-indigo-200 hover:-translate-y-0.5 active:translate-y-0 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2" 
                    [disabled]="processing">
                    <span *ngIf="processing" class="spinner-border spinner-border-sm" role="status"></span>
                    {{ processing ? 'Aguarde...' : 'Entrar na Conta' }}
                </button>
            </div>
        </form>
    </div>
    
    <div class="mt-8 text-sm text-gray-500 animate-in" style="animation-delay: 0.3s;">
        &copy; 2026 SmartApp. Todos os direitos reservados.
    </div>
</div>
