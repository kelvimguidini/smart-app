<div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-gradient-to-br from-gray-50 to-indigo-50">
    <div class="animate-in" style="animation-delay: 0.1s;">
        <a href="/">
            <div class="bg-white p-4 rounded-2xl shadow-lg mb-4">
                <img src="/logo.png" alt="SmartApp Logo" class="w-16 h-16 object-contain">
            </div>
        </a>
    </div>

    <div class="w-full sm:max-w-md mt-4 px-8 py-10 bg-white shadow-xl overflow-hidden sm:rounded-3xl animate-in" style="animation-delay: 0.2s;">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800">Redefinição de Senha</h2>
            <p class="text-gray-500 mt-2">Escolha uma nova senha forte para sua conta.</p>
        </div>

        <form #resetForm="ngForm" (ngSubmit)="resetForm.valid && submit()" class="space-y-6">
            <!-- Email Address (Readonly) -->
            <div>
                <label for="email" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600 mb-2">Seu E-mail</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input id="email" type="email" #emailInput="ngModel"
                        class="form-control block w-full bg-gray-50 border-gray-200 rounded-xl text-gray-500 cursor-not-allowed" 
                        style="padding-left: 3.25rem !important;"
                        [(ngModel)]="form.email" name="email" required email autocomplete="username" readonly>
                </div>
                <div *ngIf="errors.email" class="mt-2 text-xs text-red-600">{{ errors.email?.[0] }}</div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600 mb-2">Nova Senha</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-lock"></i>
                    </div>
                    <input id="password" [type]="showPassword ? 'text' : 'password'" #passwordInput="ngModel"
                        class="form-control block w-full border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 rounded-xl transition-all" 
                        style="padding-left: 3.25rem !important; padding-right: 3rem !important;"
                        [(ngModel)]="form.password" name="password" placeholder="••••••••" required autocomplete="new-password" autofocus
                        (input)="errors.password = null"
                        [class.border-red-500]="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || resetForm.submitted">
                    
                    <button type="button" 
                        (click)="showPassword = !showPassword"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-indigo-600 transition-colors focus:outline-none">
                        <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
                
                <div *ngIf="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || resetForm.submitted" class="mt-2 text-xs text-red-500 flex flex-col gap-1">
                    <span *ngIf="passwordInput.errors?.['required']" class="flex items-center"><i class="fas fa-exclamation-circle me-1"></i> A nova senha é obrigatória.</span>
                </div>
                <div *ngIf="errors.password" class="mt-2 text-sm text-red-600">{{ errors.password?.[0] }}</div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="password_confirmation" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600 mb-2">Confirmar Nova Senha</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <input id="password_confirmation" [type]="showConfirmPassword ? 'text' : 'password'" #confirmInput="ngModel"
                        class="form-control block w-full border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 rounded-xl transition-all" 
                        style="padding-left: 3.25rem !important; padding-right: 3rem !important;"
                        [(ngModel)]="form.password_confirmation" name="password_confirmation" placeholder="••••••••" required autocomplete="new-password"
                        (input)="errors.password_confirmation = null"
                        [class.border-red-500]="(confirmInput.invalid && (confirmInput.dirty || confirmInput.touched)) || resetForm.submitted">
                    
                    <button type="button" 
                        (click)="showConfirmPassword = !showConfirmPassword"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-indigo-600 transition-colors focus:outline-none">
                        <i class="fas" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
                
                <div *ngIf="(confirmInput.invalid && (confirmInput.dirty || confirmInput.touched)) || resetForm.submitted" class="mt-2 text-xs text-red-500 flex flex-col gap-1">
                    <span *ngIf="confirmInput.errors?.['required']" class="flex items-center"><i class="fas fa-exclamation-circle me-1"></i> A confirmação de senha é obrigatória.</span>
                </div>
                <div *ngIf="errors.password_confirmation" class="mt-2 text-sm text-red-600">{{ errors.password_confirmation?.[0] }}</div>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full flex items-center justify-center px-6 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transform active:scale-[0.98] transition-all disabled:opacity-50" 
                    [disabled]="processing">
                    <span *ngIf="processing" class="spinner-border spinner-border-sm me-2" role="status"></span>
                    <i *ngIf="!processing" class="fas fa-key me-2"></i>
                    {{ processing ? 'Processando...' : 'Redefinir Senha' }}
                </button>
            </div>
        </form>

        <!-- Footer decoration -->
        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <span class="text-xs text-gray-400 font-medium">&copy; CODE WEY Desenvolvimento</span>
        </div>
    </div>
</div>
