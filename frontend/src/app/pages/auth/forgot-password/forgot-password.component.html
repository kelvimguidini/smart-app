<div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-gradient-to-br from-gray-50 to-indigo-50">
    <div class="animate-in" style="animation-delay: 0.1s;">
        <a href="/">
            <div class="bg-white p-4 rounded-2xl shadow-lg mb-4">
                <img src="/logo.png" alt="SmartApp Logo" class="w-16 h-16 object-contain">
            </div>
        </a>
    </div>

    <div class="w-full sm:max-w-md mt-4 px-8 py-10 bg-white shadow-xl overflow-hidden sm:rounded-3xl animate-in" style="animation-delay: 0.2s;">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-gray-800">Recuperação de Acesso</h2>
            <p class="text-gray-500 mt-2">Informe seu e-mail para receber o link de redefinição.</p>
        </div>

        <!-- Session Status -->
        <div *ngIf="status" class="mb-6 p-4 bg-green-50 rounded-2xl border border-green-100 font-medium text-sm text-green-700 animate-in">
            <i class="fas fa-check-circle me-2"></i>{{ status }}
        </div>

        <form #forgotForm="ngForm" (ngSubmit)="forgotForm.valid && submit()" class="space-y-6">
            <div>
                <label for="email" class="form-label block font-bold text-xs uppercase tracking-wider text-gray-600 mb-2">Seu E-mail</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <input id="email" type="email" #emailInput="ngModel"
                        class="form-control block w-full border-gray-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 rounded-xl transition-all" 
                        style="padding-left: 3.25rem !important;"
                        [(ngModel)]="email" name="email" placeholder="exemplo@email.com" required email autofocus autocomplete="username"
                        (input)="errors.email = null"
                        [class.border-red-500]="(emailInput.invalid && (emailInput.dirty || emailInput.touched)) || forgotForm.submitted">
                </div>
                
                <div *ngIf="(emailInput.invalid && (emailInput.dirty || emailInput.touched)) || forgotForm.submitted" class="mt-2 text-xs text-red-500 flex flex-col gap-1">
                    <span *ngIf="emailInput.errors?.['required']" class="flex items-center"><i class="fas fa-exclamation-circle me-1"></i> O e-mail é obrigatório.</span>
                    <span *ngIf="emailInput.errors?.['email']" class="flex items-center"><i class="fas fa-exclamation-circle me-1"></i> Insira um e-mail válido.</span>
                </div>
                <div *ngIf="errors.email" class="mt-2 text-sm text-red-600">{{ errors.email?.[0] }}</div>
            </div>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full flex items-center justify-center px-6 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transform active:scale-[0.98] transition-all disabled:opacity-50" 
                    [disabled]="processing">
                    <span *ngIf="processing" class="spinner-border spinner-border-sm me-2" role="status"></span>
                    <i *ngIf="!processing" class="fas fa-paper-plane me-2"></i>
                    {{ processing ? 'Enviando...' : 'Enviar Link de Redefinição' }}
                </button>
            </div>

            <div class="text-center">
                <a routerLink="/login" class="inline-flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">
                    <i class="fas fa-arrow-left me-2"></i>Voltar para o login
                </a>
            </div>
        </form>
        
        <!-- Footer decoration -->
        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <span class="text-xs text-gray-400 font-medium">&copy; CODE WEY Desenvolvimento</span>
        </div>
    </div>
</div>
