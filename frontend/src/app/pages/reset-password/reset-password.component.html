<div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-gray-100">
    <div>
        <a href="/">
            <img src="/logo.png" alt="SmartApp Logo" class="w-20 h-20 object-contain">
        </a>
    </div>

    <div class="w-full sm:max-w-md mt-6 px-6 py-4 bg-white shadow-md overflow-hidden sm:rounded-lg">
        
        <form #resetForm="ngForm" (ngSubmit)="resetForm.valid && submit()">
            <!-- Email Address -->
            <div>
                <label for="email" class="block font-medium text-sm text-gray-700">Email</label>
                <input id="email" type="email" #emailInput="ngModel"
                    class="border-gray-300 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 rounded-md shadow-sm mt-1 block w-full bg-gray-50" 
                    [(ngModel)]="form.email" name="email" required email autocomplete="username" readonly>
                
                <div *ngIf="errors.email" class="mt-2 text-sm text-red-600">{{ errors.email?.[0] }}</div>
            </div>

            <!-- Password -->
            <div class="mt-4">
                <label for="password" class="block font-medium text-sm text-gray-700">Nova Senha</label>
                <input id="password" type="password" #passwordInput="ngModel"
                    class="border-gray-300 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 rounded-md shadow-sm mt-1 block w-full" 
                    [(ngModel)]="form.password" name="password" required autocomplete="new-password" autofocus
                    [class.border-red-500]="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || resetForm.submitted">
                
                <div *ngIf="(passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)) || resetForm.submitted" class="mt-1 text-xs text-red-500">
                    <span *ngIf="passwordInput.errors?.['required']">A nova senha é obrigatória.</span>
                </div>
                <div *ngIf="errors.password" class="mt-2 text-sm text-red-600">{{ errors.password?.[0] }}</div>
            </div>

            <!-- Confirm Password -->
            <div class="mt-4">
                <label for="password_confirmation" class="block font-medium text-sm text-gray-700">Confirmar Senha</label>
                <input id="password_confirmation" type="password" #confirmInput="ngModel"
                    class="border-gray-300 focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 rounded-md shadow-sm mt-1 block w-full" 
                    [(ngModel)]="form.password_confirmation" name="password_confirmation" required autocomplete="new-password"
                    [class.border-red-500]="(confirmInput.invalid && (confirmInput.dirty || confirmInput.touched)) || resetForm.submitted">
                
                <div *ngIf="(confirmInput.invalid && (confirmInput.dirty || confirmInput.touched)) || resetForm.submitted" class="mt-1 text-xs text-red-500">
                    <span *ngIf="confirmInput.errors?.['required']">A confirmação de senha é obrigatória.</span>
                </div>
                <div *ngIf="errors.password_confirmation" class="mt-2 text-sm text-red-600">{{ errors.password_confirmation?.[0] }}</div>
            </div>

            <div class="flex items-center justify-end mt-4">
                <button type="submit" class="inline-flex items-center px-4 py-2 bg-gray-800 border border-transparent rounded-md font-semibold text-xs text-white uppercase tracking-widest hover:bg-gray-700 active:bg-gray-900 focus:outline-none focus:border-gray-900 focus:ring ring-gray-300 disabled:opacity-25 transition ease-in-out duration-150" 
                    [ngClass]="{ 'opacity-25': processing || resetForm.invalid }" [disabled]="processing">
                    Redefinir Senha
                </button>
            </div>
        </form>
    </div>
</div>
