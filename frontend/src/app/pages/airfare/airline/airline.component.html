<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Gerenciamento de Companhias Aéreas</h1>
    </div>
  </ng-container>

  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <app-modal [show]="showModal" (close)="closeModal()" [title]="inEdition > 0 ? 'Editar Companhia Aérea' : 'Cadastrar Nova Companhia Aérea'" icon="fa-edit" size="md">
      <form (ngSubmit)="submit()" class="d-flex flex-column flex-grow-1 min-h-0">
        <div class="form-group mb-3">
          <label for="name" class="form-label">
            Nome da Companhia Aérea:
            <span class="text-danger">*</span>
          </label>
          <input
            type="text"
            id="name"
            class="form-control"
            [class.is-invalid]="errors['name']"
            [(ngModel)]="form.name"
            name="name"
            placeholder="Ex: LATAM"
            required
            autofocus />

          <div *ngIf="errors['name']" class="text-danger mt-1">
            <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
          </div>
        </div>
        <div class="modal-footer px-0 pb-0 pt-3 d-flex justify-content-end gap-2 border-top">
          <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
            <i class="fas fa-times me-1"></i>
            Cancelar
          </button>
          <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
            <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            <i *ngIf="!processing" class="fas fa-save me-1"></i>
            Salvar
          </button>
        </div>
      </form>
    </app-modal>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i>
              Lista de Companhias Aéreas
            </h5>
            <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i>
              Nova Companhia Aérea
            </button>
          </div>

          <app-datatable
            [pagination]="pagination"
            [loading]="isLoader"
            (search)="onSearch($event)"
            (pageChange)="onPageChange($event)"
            (perPageChange)="onPerPageChange($event)">
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="sortBy('id')" style="cursor: pointer; width: 80px">
                      <div class="d-flex align-items-center">
                        ID
                        <i
                          class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc',
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="sortBy('name')" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome
                        <i
                          class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc',
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let airline of airlines" [class.table-info]="isAirlineInEdition(airline.id)">
                    <th scope="row" class="font-weight-bold">{{ airline.id }}</th>
                    <td>
                      <span [class.text-muted]="!airline.active">{{ airline.name }}</span>
                      <span *ngIf="!airline.active" class="badge bg-light text-muted ms-2">Inativo</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <button class="btn btn-info text-white shadow-sm btn-action" (click)="edit(airline)" data-tooltip="Editar Companhia Aérea">
                          <i class="fas fa-edit"></i>
                        </button>

                        <button *ngIf="!airline.active" class="btn btn-success shadow-sm btn-action" (click)="activateAirline(airline.id)" data-tooltip="Ativar Companhia Aérea">
                          <i class="fas fa-check"></i>
                        </button>

                        <app-confirm-modal
                          *ngIf="airline.active"
                          [btnClass]="'btn btn-warning shadow-sm btn-action'"
                          [modalTitle]="'Inativar Companhia Aérea'"
                          [message]="'Tem certeza que deseja inativar a companhia aérea ' + airline.name + '?'"
                          [okButtonLabel]="'Confirmar'"
                          [tooltip]="'Inativar Companhia Aérea'"
                          (confirm)="deactivateAirline(airline.id)">
                          <span modal-button>
                            <i class="fas fa-ban"></i>
                          </span>
                        </app-confirm-modal>

                        <app-confirm-modal
                          [btnClass]="'btn btn-danger shadow-sm btn-action'"
                          [modalTitle]="'Excluir Companhia Aérea'"
                          [message]="'Ação irreversível! Deseja realmente excluir a companhia aérea ' + airline.name + '?'"
                          [okButtonLabel]="'Excluir'"
                          [tooltip]="'Excluir Companhia Aérea'"
                          (confirm)="deleteAirline(airline.id)">
                          <span modal-button>
                            <i class="fas fa-trash"></i>
                          </span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngFor="let i of [1, 2, 3, 4, 5].slice(0, isLoader ? 5 : 0)">
                    <td colspan="3" class="text-center py-3">
                      <div class="placeholder-glow">
                        <span class="placeholder col-12 rounded"></span>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="airlines.length === 0 && !isLoader">
                    <td colspan="3" class="text-center py-5 text-muted">
                      <i class="fas fa-folder-open fa-3x mb-3 d-block opacity-25"></i>
                      Nenhuma companhia aérea encontrada.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
