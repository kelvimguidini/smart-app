<app-authenticated-layout>
  <!-- Header -->
  <div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Grupo de acesso</h1>
  </div>

  <div class="row">
    <!-- Coluna Principal (9/12) -->
    <div class="col-lg-9">
      <!-- Card Formulário -->
      <div class="row">
        <div class="col-lg-12">
          <div class="card mb-4 py-3 border-left-primary">
            <div class="card-body">
              <form (ngSubmit)="submit()" #formRole="ngForm">
                <div class="row">
                  <!-- Campo Nome -->
                  <div class="col-lg-6">
                    <div class="form-group">
                      <label for="name" class="form-label">Nome:</label>
                      <input 
                        type="text" 
                        class="form-control" 
                        id="name"
                        [(ngModel)]="form.name" 
                        name="name"
                        required 
                        autofocus 
                        autocomplete="name"
                        [class.is-invalid]="errors.name"
                      >
                      <div *ngIf="errors.name" class="invalid-feedback d-block text-danger">
                        {{ errors.name[0] }}
                      </div>
                    </div>
                  </div>

                  <!-- Campo Permissões -->
                  <div class="col-lg-6">
                    <div class="form-group">
                      <label for="permissions" class="form-label">Permissão para:</label>
                      <div class="card">
                        <div class="card-body" style="max-height: 300px; overflow-y: auto;">
                          <div class="form-check" *ngFor="let option of permissionList">
                            <input 
                              class="form-check-input" 
                              type="checkbox" 
                              [value]="option.name"
                              [(ngModel)]="form.permissions"
                              [id]="option.name"
                              name="permissions"
                            >
                            <label class="form-check-label" [for]="option.name">
                              {{ option.title }}
                            </label>
                          </div>
                        </div>
                      </div>
                      <div *ngIf="errors.permissions" class="invalid-feedback d-block text-danger mt-2">
                        {{ errors.permissions[0] }}
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Botões de Ação -->
                <div class="d-flex align-items-center justify-content-end gap-2 mt-4">
                  <button 
                    type="button" 
                    class="btn btn-secondary"
                    (click)="cancelEdit()"
                    *ngIf="inEdition > 0"
                  >
                    <i class="fas fa-times"></i>
                    Cancelar
                  </button>
                  <button 
                    type="submit" 
                    class="btn btn-primary"
                    [disabled]="processing"
                    [class.opacity-50]="processing"
                  >
                    <span *ngIf="processing" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                    Salvar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Tabela de Roles -->
        <div class="col-lg-12">
          <div class="card mb-4 py-3 border-left-secondary">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-striped table-hover" id="dataTable" width="100%" cellspacing="0">
                  <thead class="table-light">
                    <tr>
                      <th scope="col">#</th>
                      <th scope="col">Nome</th>
                      <th scope="col">Ações</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr 
                      *ngFor="let role of roles"
                      [class.table-info]="isRoleInEdition(role.id)"
                    >
                      <th scope="row">{{ role.id }}</th>
                      <td>{{ role.name }}</td>
                      <td>
                        <!-- Botão Editar -->
                        <button 
                          type="button"
                          class="btn btn-sm btn-info btn-icon-split me-2"
                          (click)="edit(role)"
                          title="Editar grupo"
                        >
                          <span class="icon text-white-50">
                            <i class="fas fa-edit"></i>
                          </span>
                          <span class="text">Editar</span>
                        </button>

                        <!-- Botão Permissões (Modal) -->
                        <button 
                          type="button"
                          class="btn btn-sm btn-info btn-icon-split me-2"
                          (click)="modalPermissions.click()"
                          title="Ver permissões"
                        >
                          <span class="icon text-white-50">
                            <i class="fas fa-list"></i>
                          </span>
                          <span class="text">Permissões</span>
                        </button>
                        
                        <!-- Modal Permissões (Oculto) -->
                        <div 
                          class="modal fade" 
                          id="permissionsModal{{ role.id }}" 
                          tabindex="-1" 
                          aria-hidden="true"
                        >
                          <div class="modal-dialog">
                            <div class="modal-content">
                              <div class="modal-header">
                                <h5 class="modal-title">Permissões para {{ role.name }}</h5>
                                <button 
                                  type="button" 
                                  class="btn-close" 
                                  data-bs-dismiss="modal" 
                                  aria-label="Close"
                                ></button>
                              </div>
                              <div class="modal-body">
                                <ul class="list-group">
                                  <li 
                                    class="list-group-item d-flex justify-content-between align-items-center"
                                    *ngFor="let permission of role.permissions"
                                  >
                                    {{ permission.title }}
                                    <app-confirm-modal 
                                      [btnClass]="'btn btn-danger btn-circle btn-sm'" 
                                      [modalTitle]="'Confirmar remoção de permissão'" 
                                      [message]="'Tem certeza que deseja remover a permissão ' + permission.title + ' do grupo ' + role.name + '?'"
                                      [okButtonLabel]="'Confirmar'"
                                      (confirm)="removePermission(role.id, permission.id)">
                                      <i modal-button class="fas fa-trash"></i>
                                    </app-confirm-modal>
                                  </li>
                                </ul>
                              </div>
                            </div>
                          </div>
                        </div>

                        <!-- Botão para abrir modal (oculto) -->
                        <button 
                          #modalPermissions
                          type="button" 
                          class="btn btn-primary d-none" 
                          data-bs-toggle="modal" 
                          [attr.data-bs-target]="'#permissionsModal' + role.id"
                        ></button>

                        <!-- Botão Deletar -->
                        <app-confirm-modal 
                          [btnClass]="'btn btn-sm btn-danger btn-icon-split'" 
                          [modalTitle]="'Confirmar Exclusão de ' + role.name" 
                          [message]="'Tem certeza que deseja apagar esse registro?'"
                          [okButtonLabel]="'Confirmar'"
                          (confirm)="deleteRole(role.id)">
                          <span modal-button class="icon text-white-50">
                            <i class="fas fa-trash"></i>
                          </span>
                          <span modal-button class="text">Excluir</span>
                        </app-confirm-modal>
                      </td>
                    </tr>
                  </tbody>
                </table>

                <!-- Mensagem quando não há roles -->
                <div *ngIf="roles.length === 0 && !isLoader" class="alert alert-info">
                  Nenhum grupo de acesso cadastrado.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar (3/12) -->
    <div class="col-lg-3">
      <div class="card shadow mb-4">
        <div class="card-header py-3">
          <h6 class="m-0 font-weight-bold text-primary">Permissões</h6>
        </div>
        <div class="card-body">
          <ul class="list-group">
            <li class="list-group-item" *ngFor="let permission of permissionList">
              {{ permission.title }}
            </li>
          </ul>
          <div *ngIf="permissionList.length === 0" class="alert alert-info mt-3 mb-0">
            Nenhuma permissão disponível.
          </div>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
