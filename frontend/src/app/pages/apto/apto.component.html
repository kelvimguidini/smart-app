<app-authenticated-layout title="Apartamento">
    <ng-container header>
        <div class="d-sm-flex align-items-center justify-content-between">
            <h1 class="h3 mb-0 text-gray-800">Apartamento</h1>
        </div>
    </ng-container>

    <!-- Loader overlay -->
    <!-- <div *ngIf="isLoader" class="loader-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div> -->

    <div class="row position-relative">
        <!-- Form Section -->
        <div class="col-lg-12">
            <div class="card mb-4 py-3 border-left-primary">
                <div class="card-body">
                    <form (ngSubmit)="submit()">
                        <div class="row">
                            <div class="col-lg-6">
                                <div class="form-group">
                                    <label for="name" class="form-label">Nome:</label>
                                    <input 
                                        type="text" 
                                        id="name" 
                                        class="form-control" 
                                        [(ngModel)]="form.name" 
                                        name="name" 
                                        required 
                                        autofocus>
                                    
                                    <div *ngIf="errors['name']" class="text-danger mt-1">
                                        <small *ngFor="let err of errors['name']">{{ err }}</small>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex align-items-center justify-content-end mt-4">
                            <button 
                                type="submit" 
                                class="btn btn-primary m-1" 
                                [disabled]="processing" 
                                [class.opacity-50]="processing">
                                <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                                Salvar
                            </button>

                            <button 
                                type="button" 
                                *ngIf="inEdition > 0" 
                                class="btn btn-info m-1 text-white" 
                                (click)="resetForm()"
                                [disabled]="processing">
                                Novo
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="col-lg-12">
                <div class="card mb-4 py-3 border-left-secondary">
                    <div class="card-body">
                        <app-datatable 
                            [pagination]="pagination" 
                            [loading]="isLoader"
                            (search)="onSearch($event)"
                            (pageChange)="onPageChange($event)"
                            (perPageChange)="onPerPageChange($event)">
                            
                            <table class="table table-striped table-hover" width="100%" cellspacing="0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" (click)="sortBy('id')" style="cursor: pointer;">
                                            # <i class="fas fa-sort float-end text-muted mt-1" [ngClass]="{'fa-sort-up': sortColumn === 'id' && sortDirection === 'asc', 'fa-sort-down': sortColumn === 'id' && sortDirection === 'desc'}"></i>
                                        </th>
                                        <th scope="col" (click)="sortBy('name')" style="cursor: pointer;">
                                            Nome <i class="fas fa-sort float-end text-muted mt-1" [ngClass]="{'fa-sort-up': sortColumn === 'name' && sortDirection === 'asc', 'fa-sort-down': sortColumn === 'name' && sortDirection === 'desc'}"></i>
                                        </th>
                                        <th scope="col">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let apto of aptos" [class.table-info]="isAptoInEdition(apto.id)">
                                        <th scope="row">{{ apto.id }}</th>
                                        <td>{{ apto.name }}</td>
                                        <td>
                                            <!-- Editar -->
                                            <button class="btn btn-sm btn-info btn-icon-split me-2 mb-1" (click)="edit(apto)" title="Editar">
                                                <span class="icon text-white-50">
                                                    <i class="fas fa-edit"></i>
                                                </span>
                                                <span class="text">Editar</span>
                                            </button>

                                            <!-- Deletar -->
                                            <app-confirm-modal 
                                                [btnClass]="'btn btn-sm btn-danger btn-icon-split me-2 mb-1'" 
                                                [modalTitle]="'Atenção'" 
                                                [message]="'Tem certeza que deseja apagar esse registro?'"
                                                [okButtonLabel]="'Confirmar'"
                                                (confirm)="deleteApto(apto.id)">
                                                <span modal-button class="icon text-white-50">
                                                    <i class="fas fa-trash"></i>
                                                </span>
                                                <span modal-button class="text">Excluir</span>
                                            </app-confirm-modal>

                                            <!-- Ativar -->
                                            <button *ngIf="!apto.active" class="btn btn-sm btn-success btn-icon-split me-2 mb-1" (click)="activateApto(apto.id)" title="Ativar">
                                                <span class="icon text-white-50">
                                                    <i class="fas fa-check"></i>
                                                </span>
                                                <span class="text">Ativar</span>
                                            </button>

                                            <!-- Inativar -->
                                            <app-confirm-modal 
                                                *ngIf="apto.active"
                                                [btnClass]="'btn btn-sm btn-warning btn-icon-split me-2 mb-1'" 
                                                [modalTitle]="'Atenção'" 
                                                [message]="'Tem certeza que deseja inativar esse registro?'"
                                                [okButtonLabel]="'Confirmar'"
                                                (confirm)="deactivateApto(apto.id)">
                                                <span modal-button class="icon text-white-50">
                                                    <i class="fas fa-ban"></i>
                                                </span>
                                                <span modal-button class="text">Inativar</span>
                                            </app-confirm-modal>
                                        </td>
                                    </tr>
                                    <tr *ngIf="aptos.length === 0 && !isLoader">
                                        <td colspan="3" class="text-center py-4 text-muted">
                                            Nenhum apartamento encontrado.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </app-datatable>
                    </div>
                </div>
        </div>
    </div>
</app-authenticated-layout>
