<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Metadados de Clientes</h1>
    </div>
  </ng-container>

  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <app-modal [show]="showModal" (close)="closeModal()" [title]="inEdition > 0 ? 'Editar Opção' : 'Cadastrar Nova Opção'" icon="fa-edit" size="md">
      <form (ngSubmit)="save()" class="d-flex flex-column flex-grow-1 min-h-0">
        <div class="row">
          <!-- Cliente -->
          <div class="col-lg-12 mb-3">
            <div class="form-group mb-0">
              <label for="customer_id" class="form-label">
                Cliente <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="customer_id" [(ngModel)]="form.customer_id" name="customer_id" required [class.is-invalid]="errors['customer_id']">
                <option *ngFor="let customer of customers" [ngValue]="customer.id">{{ customer.name }}</option>
              </select>
              <div *ngIf="errors['customer_id']" class="text-danger mt-1">
                <small *ngFor="let err of errors['customer_id']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Tipo -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="type" class="form-label">
                Tipo <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="type" [(ngModel)]="form.type" name="type" required [class.is-invalid]="errors['type']">
                <option value="requester">Solicitante</option>
                <option value="sector">Setor</option>
                <option value="cost_center">Centro de Custo</option>
              </select>
              <div *ngIf="errors['type']" class="text-danger mt-1">
                <small *ngFor="let err of errors['type']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Valor -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="value" class="form-label">
                Valor <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="value" [(ngModel)]="form.value" name="value" required placeholder="Ex: Kelvim Guidini ou Setor TI ou 0001" [class.is-invalid]="errors['value']" />
              <div *ngIf="errors['value']" class="text-danger mt-1">
                <small *ngFor="let err of errors['value']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer px-0 pb-0 pt-3 d-flex justify-content-end gap-2 border-top">
          <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
            <i class="fas fa-times me-1"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
            <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
          </button>
        </div>
      </form>
    </app-modal>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i> Lista de Opções de Clientes
            </h5>
            
            <!-- Filters -->
            <div class="d-flex gap-2 align-items-center flex-wrap">
              <select class="form-select form-select-sm" style="width: 200px;" [(ngModel)]="filterCustomer" (change)="onFilterChange()" name="filterCustomer">
                <option value="">Todos os Clientes</option>
                <option *ngFor="let customer of customers" [value]="customer.id">{{ customer.name }}</option>
              </select>

              <select class="form-select form-select-sm" style="width: 180px;" [(ngModel)]="filterType" (change)="onFilterChange()" name="filterType">
                <option value="">Todos os Tipos</option>
                <option value="requester">Solicitante</option>
                <option value="sector">Setor</option>
                <option value="cost_center">Centro de Custo</option>
              </select>

              <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
                <i class="fas fa-plus me-1"></i> Nova Opção
              </button>
            </div>
          </div>

          <app-datatable
            [pagination]="{ current_page: currentPage, last_page: lastPage, total: totalItems, per_page: perPage, from: ((currentPage - 1) * perPage) + 1, to: ((currentPage - 1) * perPage) + metadataList.length }"
            [loading]="isLoader"
            (pageChange)="onPageChange($event)"
            (search)="onSearch($event)">
            
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="onSort({column: 'id', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer; width: 80px;">
                      <div class="d-flex align-items-center">
                        ID
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col">
                      <div class="d-flex align-items-center">
                        Cliente
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'type', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Tipo
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'type' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'type' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'value', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Valor
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'value' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'value' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let meta of metadataList" [class.table-info]="inEdition === meta.id">
                    <th scope="row" class="font-weight-bold">{{ meta.id }}</th>
                    <td>
                      <span [class.text-muted]="!meta.active">{{ meta.customer?.name || '-' }}</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!meta.active" class="badge bg-secondary">{{ typeLabels[meta.type] }}</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!meta.active">{{ meta.value }}</span>
                      <span *ngIf="!meta.active" class="badge bg-light text-muted ms-2 border">Inativo</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <!-- Editar -->
                        <button class="btn btn-info text-white shadow-sm btn-action" (click)="edit(meta)" data-tooltip="Editar Opção">
                          <i class="fas fa-edit"></i>
                        </button>

                        <!-- Ativar/Inativar -->
                        <button *ngIf="!meta.active" class="btn btn-success shadow-sm btn-action" (click)="activate(meta.id)" data-tooltip="Ativar Opção">
                          <i class="fas fa-check"></i>
                        </button>

                        <app-confirm-modal 
                          *ngIf="meta.active"
                          [btnClass]="'btn btn-warning shadow-sm btn-action'" 
                          [modalTitle]="'Inativar Opção'" 
                          [message]="'Tem certeza que deseja inativar o registro ' + meta.value + '?'"
                          [okButtonLabel]="'Confirmar'"
                          [tooltip]="'Inativar Opção'"
                          (confirm)="deactivate(meta.id)">
                          <span modal-button><i class="fas fa-ban"></i></span>
                        </app-confirm-modal>

                        <!-- Excluir -->
                        <app-confirm-modal 
                          [btnClass]="'btn btn-danger shadow-sm btn-action'" 
                          [modalTitle]="'Excluir Opção'" 
                          [message]="'Ação irreversível! Deseja realmente excluir o registro ' + meta.value + '?'"
                          [okButtonLabel]="'Excluir'"
                          [tooltip]="'Excluir Opção'"
                          (confirm)="deleteMetadata(meta.id)">
                          <span modal-button><i class="fas fa-trash"></i></span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="metadataList.length === 0">
                    <td colspan="5" class="text-center py-5 text-muted">
                      Nenhum registro encontrado.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
