<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-2 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Configurações de Clientes</h1>
    </div>

    <!-- Tab Navigation -->
    <ul class="nav nav-tabs mb-4 animate-in">
      <li class="nav-item">
        <a class="nav-link" routerLink="/customer-requester" routerLinkActive="active">Solicitantes</a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" routerLink="/customer-sector" routerLinkActive="active">Setores</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/customer-cost-center" routerLinkActive="active">Centros de Custo</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/crd" routerLinkActive="active">CRDs</a>
      </li>
    </ul>
  </ng-container>

  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <app-modal [show]="showModal" (close)="closeModal()" [title]="inEdition > 0 ? 'Editar Setor' : 'Cadastrar Novo Setor'" icon="fa-edit" size="md">
      <form (ngSubmit)="save()" class="d-flex flex-column flex-grow-1 min-h-0">
        <div class="row">
          <!-- Nome -->
          <div class="col-lg-12 mb-3">
            <div class="form-group mb-0">
              <label for="name" class="form-label">
                Nome <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="name" [(ngModel)]="form.name" name="name" required placeholder="Nome do Setor" autofocus [class.is-invalid]="errors['name']" />
              
              <div *ngIf="errors['name']" class="text-danger mt-1">
                <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Cliente -->
          <div class="col-lg-12 mb-3">
            <div class="form-group mb-0">
              <label for="customer_id" class="form-label">
                Cliente <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="customer_id" [(ngModel)]="form.customer_id" name="customer_id" required [class.is-invalid]="errors['customer_id']">
                <option [ngValue]="0" disabled selected>Selecione</option>
                <option *ngFor="let customer of customers" [ngValue]="customer.id">{{ customer.name }}</option>
              </select>
              
              <div *ngIf="errors['customer_id']" class="text-danger mt-1">
                <small *ngFor="let err of errors['customer_id']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer px-0 pb-0 pt-3 d-flex justify-content-end gap-2 border-top">
          <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
            <i class="fas fa-times me-1"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
            <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
          </button>
        </div>
      </form>
    </app-modal>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i> Lista de Setores de Clientes
            </h5>
            <button type="button" class="btn btn-primary shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i> Novo Setor
            </button>
          </div>

          <app-datatable
            [pagination]="{ current_page: currentPage, last_page: lastPage, total: totalItems, per_page: perPage, from: ((currentPage - 1) * perPage) + 1, to: ((currentPage - 1) * perPage) + sectors.length }"
            [loading]="isLoader"
            (pageChange)="onPageChange($event)"
            (search)="onSearch($event)">
            
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="onSort({column: 'id', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer; width: 80px;">
                      <div class="d-flex align-items-center">
                        ID
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'name', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome Setor
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col">
                      <div class="d-flex align-items-center">
                        Empresa / Cliente
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let item of sectors" [class.table-info]="inEdition === item.id">
                    <th scope="row" class="font-weight-bold">{{ item.id }}</th>
                    <td>
                      <span [class.text-muted]="!item.active">{{ item.name }}</span>
                      <span *ngIf="!item.active" class="badge bg-light text-muted ms-2 border">Inativo</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!item.active">{{ item.customer?.name || '-' }}</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <!-- Editar -->
                        <button class="btn btn-info text-white shadow-sm btn-action" (click)="edit(item)" title="Editar">
                          <i class="fas fa-edit"></i>
                        </button>
                        
                        <!-- Ativar/Inativar -->
                        <button *ngIf="!item.active" class="btn btn-success shadow-sm btn-action" (click)="activate(item.id)" title="Ativar">
                          <i class="fas fa-check"></i>
                        </button>
                        
                        <app-confirm-modal 
                          *ngIf="item.active"
                          [btnClass]="'btn btn-warning shadow-sm btn-action'" 
                          [modalTitle]="'Inativar Setor'" 
                          [message]="'Tem certeza que deseja inativar o setor \'' + item.name + '\'?'"
                          [okButtonLabel]="'Confirmar'"
                          [tooltip]="'Inativar'"
                          (confirm)="deactivate(item.id)">
                          <span modal-button><i class="fas fa-ban"></i></span>
                        </app-confirm-modal>
                        
                        <!-- Excluir -->
                        <app-confirm-modal 
                          [btnClass]="'btn btn-danger shadow-sm btn-action'" 
                          [modalTitle]="'Excluir Setor'" 
                          [message]="'Ação irreversível! Deseja realmente excluir o setor \'' + item.name + '\'?'"
                          [okButtonLabel]="'Excluir'"
                          [tooltip]="'Excluir'"
                          (confirm)="deleteItem(item.id)">
                          <span modal-button><i class="fas fa-trash"></i></span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="sectors.length === 0">
                    <td colspan="4" class="text-center py-5 text-muted">
                      Nenhum setor encontrado.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
