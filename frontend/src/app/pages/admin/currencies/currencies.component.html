<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Gerenciamento de Moedas</h1>
    </div>
  </ng-container>

  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <app-modal [show]="showModal" (close)="closeModal()" [title]="inEdition > 0 ? 'Editar Moeda' : 'Cadastrar Nova Moeda'" icon="fa-edit" size="md">
      <form (ngSubmit)="save()" class="d-flex flex-column flex-grow-1 min-h-0">
        <div class="row">
          <!-- Nome da Moeda -->
          <div class="col-lg-12 mb-3">
            <div class="form-group mb-0">
              <label for="name" class="form-label">
                Nome da Moeda
                <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="name" [(ngModel)]="form.name" name="name" required placeholder="Ex: Real, Dólar" autofocus [class.is-invalid]="errors['name']" />
              
              <div *ngIf="errors['name']" class="text-danger mt-1">
                <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Sigla -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="sigla" class="form-label">
                Sigla
              </label>
              <input type="text" class="form-control" id="sigla" [(ngModel)]="form.sigla" name="sigla" placeholder="Ex: BRL, USD" [class.is-invalid]="errors['sigla']" />
              
              <div *ngIf="errors['sigla']" class="text-danger mt-1">
                <small *ngFor="let err of errors['sigla']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Símbolo -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="symbol" class="form-label">
                Símbolo
                <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="symbol" [(ngModel)]="form.symbol" name="symbol" required placeholder="Ex: R$, $" [class.is-invalid]="errors['symbol']" />
              
              <div *ngIf="errors['symbol']" class="text-danger mt-1">
                <small *ngFor="let err of errors['symbol']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer px-0 pb-0 pt-3 d-flex justify-content-end gap-2 border-top">
          <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
            <i class="fas fa-times me-1"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
            <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
          </button>
        </div>
      </form>
    </app-modal>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i> Lista de Moedas
            </h5>
            <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i> Nova Moeda
            </button>
          </div>

          <app-datatable
            [pagination]="{ current_page: currentPage, last_page: lastPage, total: totalItems, per_page: perPage, from: ((currentPage - 1) * perPage) + 1, to: ((currentPage - 1) * perPage) + currencies.length }"
            [loading]="isLoader"
            (pageChange)="onPageChange($event)"
            (search)="onSearch($event)">
            
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="onSort({column: 'id', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer; width: 80px;">
                      <div class="d-flex align-items-center">
                        ID
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'name', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'sigla', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Sigla
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'sigla' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'sigla' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'symbol', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Símbolo
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'symbol' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'symbol' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let currency of currencies" [class.table-info]="inEdition === currency.id">
                    <th scope="row" class="font-weight-bold">{{ currency.id }}</th>
                    <td>
                      <span [class.text-muted]="!currency.active">{{ currency.name }}</span>
                      <span *ngIf="!currency.active" class="badge bg-light text-muted ms-2 border">Inativo</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!currency.active">{{ currency.sigla || '-' }}</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!currency.active">{{ currency.symbol || '-' }}</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <!-- Editar -->
                        <button class="btn btn-info text-white shadow-sm btn-action" (click)="edit(currency)" data-tooltip="Editar Moeda">
                          <i class="fas fa-edit"></i>
                        </button>

                        <!-- Ativar/Inativar -->
                        <button *ngIf="!currency.active" class="btn btn-success shadow-sm btn-action" (click)="activate(currency.id)" data-tooltip="Ativar Moeda">
                          <i class="fas fa-check"></i>
                        </button>

                        <app-confirm-modal 
                          *ngIf="currency.active"
                          [btnClass]="'btn btn-warning shadow-sm btn-action'" 
                          [modalTitle]="'Inativar Moeda'" 
                          [message]="'Tem certeza que deseja inativar a moeda ' + currency.name + '?'"
                          [okButtonLabel]="'Confirmar'"
                          [tooltip]="'Inativar Moeda'"
                          (confirm)="deactivate(currency.id)">
                          <span modal-button><i class="fas fa-ban"></i></span>
                        </app-confirm-modal>

                        <!-- Excluir -->
                        <app-confirm-modal 
                          [btnClass]="'btn btn-danger shadow-sm btn-action'" 
                          [modalTitle]="'Excluir Moeda'" 
                          [message]="'Ação irreversível! Deseja realmente excluir a moeda ' + currency.name + '?'"
                          [okButtonLabel]="'Excluir'"
                          [tooltip]="'Excluir Moeda'"
                          (confirm)="deleteCurrency(currency.id)">
                          <span modal-button><i class="fas fa-trash"></i></span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="currencies.length === 0">
                    <td colspan="5" class="text-center py-5 text-muted">
                      Nenhuma moeda encontrada.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
