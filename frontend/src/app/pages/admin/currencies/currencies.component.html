<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Gerenciamento de Moedas</h1>
    </div>
  </ng-container>

  <div class="row position-relative">
    <!-- Form Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.1s" id="formSection">
      <div class="card mb-4 border-left-primary">
        <div class="card-body">
          <h5 class="card-title mb-4 text-primary font-weight-bold">
            <i class="fas fa-coins me-2"></i>
            {{ inEdition > 0 ? 'Editar Moeda' : 'Nova Moeda' }}
          </h5>
          <form (ngSubmit)="save()" #currencyForm="ngForm">
            <div class="row align-items-end">
              <div class="col-lg-8">
                <div class="form-group mb-0">
                  <label for="name" class="form-label">
                    Nome da Moeda
                    <span class="text-danger">*</span>
                  </label>
                  <input type="text" class="form-control" id="name" [(ngModel)]="form.name" name="name" required placeholder="Ex: Dólar, Euro, Real" autofocus />
                </div>
              </div>
              <div class="col-lg-4">
                <div class="d-flex align-items-center justify-content-end mt-3 mt-lg-0">
                  <button type="button" *ngIf="inEdition > 0" class="btn btn-outline-secondary me-2" (click)="resetForm()" [disabled]="processing">
                    <i class="fas fa-times me-1"></i> Cancelar
                  </button>
                  <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing || !currencyForm.form.valid">
                    <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                    <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i> Lista de Moedas
            </h5>
          </div>

          <app-datatable
            [pagination]="{ current_page: currentPage, last_page: lastPage, total: totalItems, per_page: perPage, from: ((currentPage - 1) * perPage) + 1, to: ((currentPage - 1) * perPage) + currencies.length }"
            [loading]="processing"
            (pageChange)="onPageChange($event)"
            (search)="onSearch($event)">
            
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="onSort({column: 'name', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'active', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Status
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'active' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'active' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let currency of currencies" [class.table-info]="inEdition === currency.id">
                    <td>
                      <span [class.text-muted]="!currency.active">{{ currency.name }}</span>
                    </td>
                    <td>
                      <span class="badge" [ngClass]="currency.active ? 'bg-success' : 'bg-danger'">
                        {{ currency.active ? 'Ativo' : 'Inativo' }}
                      </span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <button class="btn btn-sm btn-info text-white shadow-sm" (click)="edit(currency)" title="Editar">
                          <i class="fas fa-edit me-1"></i> Editar
                        </button>
                        <button *ngIf="currency.active" class="btn btn-sm btn-warning shadow-sm" (click)="deactivate(currency.id)" title="Inativar">
                          <i class="fas fa-ban me-1"></i> Inativar
                        </button>
                        <button *ngIf="!currency.active" class="btn btn-sm btn-success shadow-sm" (click)="activate(currency.id)" title="Ativar">
                          <i class="fas fa-check me-1"></i> Ativar
                        </button>
                        <button class="btn btn-sm btn-danger shadow-sm" (click)="deleteCurrency(currency.id)" title="Excluir">
                          <i class="fas fa-trash me-1"></i> Excluir
                        </button>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="currencies.length === 0">
                    <td colspan="3" class="text-center py-5 text-muted">
                      Nenhuma moeda encontrada.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
