<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Gerenciamento de CRDs</h1>
    </div>
  </ng-container>

  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <app-modal [show]="showModal" (close)="closeModal()" [title]="inEdition > 0 ? 'Editar CRD' : 'Cadastrar Novo CRD'" icon="fa-edit" size="md">
      <form (ngSubmit)="save()" class="d-flex flex-column flex-grow-1 min-h-0">
        <div class="row">
          <!-- Nome -->
          <div class="col-lg-12 mb-3">
            <div class="form-group mb-0">
              <label for="name" class="form-label">
                Nome <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="name" [(ngModel)]="form.name" name="name" required placeholder="Nome do CRD" autofocus [class.is-invalid]="errors['name']" />
              
              <div *ngIf="errors['name']" class="text-danger mt-1">
                <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Número -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="number" class="form-label">
                Número <span class="text-danger">*</span>
              </label>
              <input type="text" class="form-control" id="number" [(ngModel)]="form.number" name="number" required placeholder="Ex: 99.999.9999.99999" mask="00.000.0000.00000" [dropSpecialCharacters]="false" [class.is-invalid]="errors['number']" />
              
              <div *ngIf="errors['number']" class="text-danger mt-1">
                <small *ngFor="let err of errors['number']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>

          <!-- Cliente -->
          <div class="col-lg-6 mb-3">
            <div class="form-group mb-0">
              <label for="customer_id" class="form-label">
                Cliente <span class="text-danger">*</span>
              </label>
              <select class="form-select" id="customer_id" [(ngModel)]="form.customer_id" name="customer_id" required [class.is-invalid]="errors['customer_id']">
                <option [ngValue]="0" disabled selected>Selecione</option>
                <option *ngFor="let customer of customers" [ngValue]="customer.id">{{ customer.name }}</option>
              </select>
              
              <div *ngIf="errors['customer_id']" class="text-danger mt-1">
                <small *ngFor="let err of errors['customer_id']" class="d-block">{{ err }}</small>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer px-0 pb-0 pt-3 d-flex justify-content-end gap-2 border-top">
          <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
            <i class="fas fa-times me-1"></i> Cancelar
          </button>
          <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
            <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
            <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
          </button>
        </div>
      </form>
    </app-modal>

    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i> Lista de CRDs
            </h5>
            <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i> Novo CRD
            </button>
          </div>

          <app-datatable
            [pagination]="{ current_page: currentPage, last_page: lastPage, total: totalItems, per_page: perPage, from: ((currentPage - 1) * perPage) + 1, to: ((currentPage - 1) * perPage) + crds.length }"
            [loading]="isLoader"
            (pageChange)="onPageChange($event)"
            (search)="onSearch($event)">
            
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="onSort({column: 'id', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer; width: 80px;">
                      <div class="d-flex align-items-center">
                        ID
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'name', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="onSort({column: 'number', direction: sortDirection === 'asc' ? 'desc' : 'asc'})" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Número
                        <i class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'number' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'number' && sortDirection === 'desc'
                          }"></i>
                      </div>
                    </th>
                    <th scope="col">
                      <div class="d-flex align-items-center">
                        Cliente
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let crd of crds" [class.table-info]="inEdition === crd.id">
                    <th scope="row" class="font-weight-bold">{{ crd.id }}</th>
                    <td>
                      <span [class.text-muted]="!crd.active">{{ crd.name }}</span>
                      <span *ngIf="!crd.active" class="badge bg-light text-muted ms-2 border">Inativo</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!crd.active">{{ crd.number }}</span>
                    </td>
                    <td>
                      <span [class.text-muted]="!crd.active">{{ crd.customer?.name || '-' }}</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <!-- Editar -->
                        <button class="btn btn-info text-white shadow-sm btn-action" (click)="edit(crd)" data-tooltip="Editar CRD">
                          <i class="fas fa-edit"></i>
                        </button>

                        <!-- Ativar/Inativar -->
                        <button *ngIf="!crd.active" class="btn btn-success shadow-sm btn-action" (click)="activate(crd.id)" data-tooltip="Ativar CRD">
                          <i class="fas fa-check"></i>
                        </button>

                        <app-confirm-modal 
                          *ngIf="crd.active"
                          [btnClass]="'btn btn-warning shadow-sm btn-action'" 
                          [modalTitle]="'Inativar CRD'" 
                          [message]="'Tem certeza que deseja inativar o CRD ' + crd.name + '?'"
                          [okButtonLabel]="'Confirmar'"
                          [tooltip]="'Inativar CRD'"
                          (confirm)="deactivate(crd.id)">
                          <span modal-button><i class="fas fa-ban"></i></span>
                        </app-confirm-modal>

                        <!-- Excluir -->
                        <app-confirm-modal 
                          [btnClass]="'btn btn-danger shadow-sm btn-action'" 
                          [modalTitle]="'Excluir CRD'" 
                          [message]="'Ação irreversível! Deseja realmente excluir o CRD ' + crd.name + '?'"
                          [okButtonLabel]="'Excluir'"
                          [tooltip]="'Excluir CRD'"
                          (confirm)="deleteCrd(crd.id)">
                          <span modal-button><i class="fas fa-trash"></i></span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="crds.length === 0">
                    <td colspan="5" class="text-center py-5 text-muted">
                      Nenhum CRD encontrado.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
