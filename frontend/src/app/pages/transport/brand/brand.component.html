<app-authenticated-layout>
  <ng-container header>
    <div class="d-sm-flex align-items-center justify-content-between mb-4 animate-in">
      <h1 class="h3 mb-0 text-gray-800">Gerenciamento de Marcas de Veículo</h1>
    </div>
  </ng-container>
 
  <div class="row position-relative">
    <!-- Modal de Cadastro/Edição -->
    <div class="modal fade" 
         [class.show]="showModal" 
         [style.display]="showModal ? 'block' : 'none'" 
         [style.background]="showModal ? 'rgba(0,0,0,0.5)' : ''" 
         tabindex="-1" 
         role="dialog" 
         aria-labelledby="brandModalLabel" 
         aria-hidden="true">
      <div class="modal-dialog modal-md modal-dialog-centered" role="document">
        <div class="modal-content border-0 shadow-lg rounded-3xl animate-in">
          <div class="modal-header bg-light">
            <h5 class="modal-title font-weight-bold text-primary" id="brandModalLabel">
              <i class="fas fa-edit me-2"></i>{{ inEdition > 0 ? 'Editar Marca' : 'Cadastrar Nova Marca' }}
            </h5>
            <button type="button" class="btn-close" (click)="closeModal()" aria-label="Fechar" [disabled]="processing"></button>
          </div>
          <form (ngSubmit)="submit()">
            <div class="modal-body p-4">
              <div class="row">
                <div class="col-lg-12">
                  <div class="form-group mb-0">
                    <label for="name" class="form-label">
                      Nome da Marca:
                      <span class="text-danger">*</span>
                    </label>
                    <input 
                      type="text" 
                      id="name" 
                      class="form-control" 
                      [class.is-invalid]="errors['name']"
                      [(ngModel)]="form.name" 
                      name="name" 
                      placeholder="Ex: Toyota" 
                      required 
                      autofocus />
 
                    <div *ngIf="errors['name']" class="text-danger mt-1">
                      <small *ngFor="let err of errors['name']" class="d-block">{{ err }}</small>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="modal-footer bg-light border-0">
              <button type="button" class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="processing">
                <i class="fas fa-times me-1"></i> Cancelar
              </button>
              <button type="submit" class="btn btn-primary shadow-sm" [disabled]="processing">
                <span *ngIf="processing" class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                <i *ngIf="!processing" class="fas fa-save me-1"></i> Salvar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
 
    <!-- Table Section -->
    <div class="col-lg-12 animate-in" style="animation-delay: 0.2s">
      <div class="card mb-4 border-left-secondary">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h5 class="card-title mb-0 text-secondary font-weight-bold">
              <i class="fas fa-list me-2"></i>
              Lista de Marcas
            </h5>
            <button class="btn btn-primary btn-sm shadow-sm" (click)="openModal()" [disabled]="processing">
              <i class="fas fa-plus me-1"></i> Nova Marca
            </button>
          </div>
 
          <app-datatable
            [pagination]="pagination"
            [loading]="isLoader"
            (search)="onSearch($event)"
            (pageChange)="onPageChange($event)"
            (perPageChange)="onPerPageChange($event)">
            <div class="table-responsive">
              <table class="table table-hover" width="100%" cellspacing="0">
                <thead class="table-light">
                  <tr>
                    <th scope="col" (click)="sortBy('id')" style="cursor: pointer; width: 80px">
                      <div class="d-flex align-items-center">
                        ID
                        <i
                          class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'id' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'id' && sortDirection === 'desc',
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" (click)="sortBy('name')" style="cursor: pointer">
                      <div class="d-flex align-items-center">
                        Nome
                        <i
                          class="fas fa-sort ms-2 text-muted"
                          [ngClass]="{
                            'fa-sort-up text-primary': sortColumn === 'name' && sortDirection === 'asc',
                            'fa-sort-down text-primary': sortColumn === 'name' && sortDirection === 'desc',
                          }"></i>
                      </div>
                    </th>
                    <th scope="col" class="text-end">Ações</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let brand of brands" [class.table-info]="isBrandInEdition(brand.id)">
                    <th scope="row" class="font-weight-bold">{{ brand.id }}</th>
                    <td>
                      <span [class.text-muted]="!brand.active">{{ brand.name }}</span>
                      <span *ngIf="!brand.active" class="badge bg-light text-muted ms-2">Inativo</span>
                    </td>
                    <td class="text-end">
                      <div class="d-flex justify-content-end gap-2 flex-wrap">
                        <button class="btn btn-sm btn-info text-white shadow-sm" (click)="edit(brand)" title="Editar">
                          <i class="fas fa-edit me-1"></i>
                          Editar
                        </button>
 
                        <button
                          *ngIf="!brand.active"
                          class="btn btn-sm btn-success shadow-sm"
                          (click)="activateBrand(brand.id)"
                          title="Ativar">
                          <i class="fas fa-check me-1"></i>
                          Ativar
                        </button>
 
                        <app-confirm-modal
                          *ngIf="brand.active"
                          [btnClass]="'btn btn-sm btn-warning shadow-sm'"
                          [modalTitle]="'Inativar Marca'"
                          [message]="'Tem certeza que deseja inativar a marca ' + brand.name + '?'"
                          [okButtonLabel]="'Confirmar'"
                          (confirm)="deactivateBrand(brand.id)">
                          <span modal-button>
                            <i class="fas fa-ban me-1"></i>
                            Inativar
                          </span>
                        </app-confirm-modal>
 
                        <app-confirm-modal
                          [btnClass]="'btn btn-sm btn-danger shadow-sm'"
                          [modalTitle]="'Excluir Marca'"
                          [message]="'Ação irreversível! Deseja realmente excluir a marca ' + brand.name + '?'"
                          [okButtonLabel]="'Excluir'"
                          (confirm)="deleteBrand(brand.id)">
                          <span modal-button>
                            <i class="fas fa-trash me-1"></i>
                            Excluir
                          </span>
                        </app-confirm-modal>
                      </div>
                    </td>
                  </tr>
                  <tr *ngFor="let i of [1, 2, 3, 4, 5].slice(0, isLoader ? 5 : 0)">
                    <td colspan="3" class="text-center py-3">
                      <div class="placeholder-glow">
                        <span class="placeholder col-12 rounded"></span>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="brands.length === 0 && !isLoader">
                    <td colspan="3" class="text-center py-5 text-muted">
                      <i class="fas fa-folder-open fa-3x mb-3 d-block opacity-25"></i>
                      Nenhuma marca encontrada.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </app-datatable>
        </div>
      </div>
    </div>
  </div>
</app-authenticated-layout>
