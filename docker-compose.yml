version: '3.8'

services:
  angular:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "4201:4201"
    command: bash -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --port 4201 --poll 2000"
    depends_on:
      - app

  app:
    build: .
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apismart
      MYSQL_USER: apismart
      MYSQL_PASSWORD: casanova
    volumes:
      - mysql_data:/var/lib/mysql369
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

volumes:
  mysql_data:
