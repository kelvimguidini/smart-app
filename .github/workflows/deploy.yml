name: Deploy via FTP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Setup PHP (PHP 8.1)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist

      # - name: Run Angular Tests
      #   run: npm run test:frontend

      - name: Build Angular Frontend
        run: |
          npm install --legacy-peer-deps
          npm run build

      # - name: Run Migrations
      #   env:
      #     APP_ENV: production
      #     APP_KEY: ${{ secrets.APP_KEY }}
      #     DB_CONNECTION: mysql
      #     DB_HOST: ${{ secrets.DB_HOST }}
      #     DB_PORT: ${{ secrets.DB_PORT }}
      #     DB_DATABASE: ${{ secrets.DB_DATABASE }}
      #     DB_USERNAME: ${{ secrets.DB_USERNAME }}
      #     DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      #   run: php artisan migrate --force

      - name: Check for composer changes
        id: changed-composer
        uses: tj-actions/changed-files@v44
        with:
          files: |
            composer.json
            composer.lock

      - name: Set FTP Exclude List
        id: set-exclude
        run: |
          echo "EXCLUDE_LIST<<EOF" >> $GITHUB_ENV
          echo "**/.git*" >> $GITHUB_ENV
          echo "**/node_modules/**" >> $GITHUB_ENV
          echo "**/tests/**" >> $GITHUB_ENV
          echo "**/storage/**" >> $GITHUB_ENV
          echo "**/public/storage/**" >> $GITHUB_ENV
          echo "**/frontend/**" >> $GITHUB_ENV
          echo "**vite.config.js**" >> $GITHUB_ENV
          echo "**.env**" >> $GITHUB_ENV
          echo "**nginx.conf**" >> $GITHUB_ENV
          if [ "${{ steps.changed-composer.outputs.any_changed }}" == "false" ]; then
            echo "**/vendor/**" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Upload Files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 2121
          protocol: ftps
          timeout: 30000
          local-dir: ./
          server-dir: /www/
          exclude: ${{ env.EXCLUDE_LIST }}
